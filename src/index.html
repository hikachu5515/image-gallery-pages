<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>画像ギャラリー</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="shell header-bar">
          <a class="brand" href="./">
            <span class="brand-mark">IG</span>
            <span class="brand-text">画像ギャラリー</span>
          </a>
          <nav class="site-nav" aria-label="主要ナビゲーション">
            <a href="#gallery">ギャラリー</a>
            <a href="#folders">フォルダ</a>
            <a id="home-link" href="./">トップ</a>
          </nav>
        </div>
      </header>

      <main>
        <section class="hero">
          <div class="shell hero-panel">
            <div class="hero-copy">
              <p class="eyebrow">画像ギャラリー</p>
              <h1>落ち着いた空気感で、画像を見やすく整理したギャラリー。</h1>
              <p class="intro">
                <code>images/</code> ディレクトリから生成されたフォルダを、暗めのヒーローと
                余白を活かした白いパネル構成で閲覧できます。
              </p>
            </div>
            <div class="hero-stats" aria-label="ギャラリー概要">
              <article class="stat-card">
                <p class="stat-label">フォルダ</p>
                <p id="folder-count" class="stat-value">0</p>
              </article>
              <article class="stat-card">
                <p class="stat-label">画像</p>
                <p id="image-count" class="stat-value">0</p>
              </article>
            </div>
          </div>
        </section>

        <section class="shell content-wrap" id="gallery">
          <div class="content-panel">
            <aside class="sidebar" id="folders">
              <div class="sidebar-head">
                <div>
                  <p class="section-label">ナビゲーション</p>
                  <h2>フォルダ</h2>
                </div>
              </div>
              <nav id="folder-list" class="folder-list" aria-label="ギャラリーフォルダ"></nav>
            </aside>
            <section class="content">
              <div class="content-head">
                <div>
                  <p class="section-label">表示中</p>
                  <h2 id="view-title">すべてのフォルダ</h2>
                </div>
                <p id="view-meta" class="view-meta"></p>
              </div>
              <div id="empty-state" class="empty-state" hidden></div>
              <div id="gallery-grid" class="gallery-grid"></div>
            </section>
          </div>
        </section>
      </main>
    </div>
    <template id="folder-card-template">
      <a class="folder-card"></a>
    </template>
    <template id="image-card-template">
      <article class="image-card">
        <a class="image-link" target="_blank" rel="noreferrer">
          <img class="image-thumb" loading="lazy" alt="" />
        </a>
        <div class="image-meta">
          <p class="image-name"></p>
          <p class="image-file"></p>
        </div>
      </article>
    </template>
    <script type="module" src="./app.js"></script>
  </body>
</html>
